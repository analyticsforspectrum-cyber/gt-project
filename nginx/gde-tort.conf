# nginx reverse proxy config for ГДЕ ТОРТ?
# Place in /etc/nginx/sites-available/gde-tort.conf
# then: sudo ln -s /etc/nginx/sites-available/gde-tort.conf /etc/nginx/sites-enabled/
# and:  sudo nginx -t && sudo systemctl reload nginx

upstream nextjs {
    server 127.0.0.1:3000;
    keepalive 32;
}

upstream nestjs {
    server 127.0.0.1:4010;
    keepalive 32;
}

# Rate limiting zones
limit_req_zone $binary_remote_addr zone=api:10m rate=30r/m;
limit_req_zone $binary_remote_addr zone=auth:10m rate=5r/m;

server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;  # e.g. tort.example.com

    # Redirect HTTP → HTTPS (uncomment after SSL setup)
    # return 301 https://$host$request_uri;

    # --- Static / Next.js ---
    location / {
        proxy_pass http://nextjs;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }

    # --- API ---
    location /api/ {
        limit_req zone=api burst=20 nodelay;
        proxy_pass http://nestjs/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # Large body for SAP file uploads
        client_max_body_size 55m;
    }

    # Tighter rate limit on auth endpoints
    location /api/auth/ {
        limit_req zone=auth burst=5 nodelay;
        proxy_pass http://nestjs/auth/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # Health check (no rate limit)
    location /health {
        proxy_pass http://nestjs/health;
        access_log off;
    }
}

