services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "${MONGO_PORT:-27017}:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:-gde_tort}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:-gde_tort_dev}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE:-gde_tort}
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "mongosh --quiet -u \"${MONGO_INITDB_ROOT_USERNAME:-gde_tort}\" -p \"${MONGO_INITDB_ROOT_PASSWORD:-gde_tort_dev}\" --authenticationDatabase admin --eval \"db.adminCommand('ping').ok\" | grep 1"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "${API_PORT:-4010}:4000"
    environment:
      NODE_ENV: production
      PORT: 4000
      API_PREFIX: api
      WEB_ORIGIN: ${WEB_ORIGIN:-http://localhost:3000}
      MONGO_URI: mongodb://${MONGO_INITDB_ROOT_USERNAME:-gde_tort}:${MONGO_INITDB_ROOT_PASSWORD:-gde_tort_dev}@mongo:27017/${MONGO_INITDB_DATABASE:-gde_tort}?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-local-development-secret-for-gde-tort-docker-12345}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-8h}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@gdetort.local}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-ChangeMe123!}
      ADMIN_NAME: ${ADMIN_NAME:-GDE TORT Admin}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:4000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: apps/web/Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4010/api}
    restart: unless-stopped
    depends_on:
      api:
        condition: service_healthy
    ports:
      - "${WEB_PORT:-3000}:3000"
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4010/api}
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))"
        ]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  mongo_data:
